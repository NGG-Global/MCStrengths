document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\"שאלון VIA איתור חוזקות\" aria-label=\"שאלון VIA איתור חוזקות\">\n      <div class=\"fadeup\" style=\"animation-delay:.05s;font:500 14px Ploni;color:#AD2185;margin-bottom:8px;\">שאלון VIA איתור חוזקות<\u002Fdiv>\n      <div class=\"rise\" style=\"animation-delay:.12s;background:#fff;border-radius:24px;padding:34px 30px;box-shadow:0 16px 44px rgba(20,24,60,.08);border:1px solid rgba(23,22,22,.05);position:relative;overflow:hidden;\">\n        <div style=\"position:absolute;top:-40px;left:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(115,217,240,.22),transparent 70%);\"><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px;position:relative;\">\n          <div style=\"width:54px;height:54px;border-radius:16px;background:linear-gradient(145deg,#D25089,#AD2185);display:flex;align-items:center;justify-content:center;flex:0 0 auto;box-shadow:0 8px 20px rgba(173,33,133,.3);\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 19.5A2.5 2.5 0 0 1 6.5 17H20\"><\u002Fpath><path d=\"M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n          <h2 style=\"margin:0;font:600 26px Ploni;color:#040450;\">הסבר<\u002Fh2>\n        <\u002Fdiv>\n        <p style=\"margin:0;font:400 19px/1.75 Ploni;color:#2B2B2E;position:relative;\">שאלון VIA  נוצר על ידי כריסטופר פטרסון ומרטין זליגמן על בסיס מחקרם בנושא חוזקות וערכים (Character Strengths and Virtues: A Handbook and Classification, 2004). השאלון המובא כאן הינו שאלון מקוצר של שאלון VIA המקורי וכולל 24 תיאורי חוזקות.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:30px;gap:12px;\">\n        <button onclick=\"{{ goIntro }}\" style=\"background:none;border:none;color:#808285;font:500 16px Ploni;cursor:pointer;padding:10px 6px;\">חזרה<\u002Fbutton>\n        <button onclick=\"{{ goBefore }}\" style=\"background:linear-gradient(145deg,#1E3C95,#0E1F6B);color:#fff;border:none;border-radius:999px;padding:14px 40px;font:600 18px Ploni;cursor:pointer;box-shadow:0 10px 26px rgba(20,24,60,.24);transition:transform .25s;\" style-hover=\"transform:translateY(-2px);\">להנחיות<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== מסך 3: הנחיות לפני ===== -->\n    <sc-if value=\"{{ isBefore }}\" hint-placeholder-val=\"{{ false }}\">\n    <section class=\"screen\" data-screen-label=\"הנחיות לפני ביצוע שאלון\" aria-label=\"הנחיות לפני ביצוע שאלון\">\n      <h2 class=\"fadeup\" style=\"animation-delay:.05s;font:600 28px Ploni;color:#040450;margin:0 0 22px;\">הנחיות לפני ביצוע שאלון<\u002Fh2>\n      <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <div class=\"fadeup\" style=\"animation-delay:.16s;display:flex;gap:14px;background:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 8px 24px rgba(20,24,60,.05);border:1px solid rgba(23,22,22,.05);\">\n          <span style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid #A7C86F;display:flex;align-items:center;justify-content:center;color:#7BA53F;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7BA53F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n          <p style=\"margin:0;font:400 18px/1.65 Ploni;color:#2B2B2E;\">ההנחיות מנוסחות בצורת זכר אך מכוונות לשני המינים באותה המידה.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"fadeup\" style=\"animation-delay:.28s;display:flex;gap:14px;background:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 8px 24px rgba(20,24,60,.05);border:1px solid rgba(23,22,22,.05);\">\n          <span style=\"flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:2px solid #A7C86F;display:flex;align-items:center;justify-content:center;\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#7BA53F\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"20 6 9 17 4 12\"><\u002Fpolyline><\u002Fsvg><\u002Fspan>\n          <p style=\"margin:0;font:400 18px/1.65 Ploni;color:#2B2B2E;\">אנשים שונים מוצאים את התיאורים נכונים להם ברמה כזו או אחרת. אנא ענה על פי מה שמשקף את הצוות שלך באופן המדויק ביותר על מנת לקבל את דירוג החוזקות הייחודיות לו. אין שגוי ונכון במענה על שאלון זה.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;align-items:center;margin-top:30px;gap:12px;\">\n        <button onclick=\"{{ goAbout }}\" style=\"background:none;border:none;color:#808285;font:500 16px Ploni;cursor:pointer;padding:10px 6px;\">חזרה<\u002Fbutton>\n        <button onclick=\"{{ goQuiz }}\" style=\"background:linear-gradient(145deg,#D25089,#AD2185);color:#fff;border:none;border-radius:999px;padding:14px 44px;font:600 18px Ploni;cursor:pointer;box-shadow:0 12px 30px rgba(173,33,133,.3);transition:transform .25s;\" style-hover=\"transform:translateY(-2px);\">לשאלון<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <!-- ===== מסך 5: שאלון VIA ===== -->\n    <sc-if value=\"{{ isQuiz }}\" hint-placeholder-val=\"{{ false }}\">\n    <section class=\"screen\" data-screen-label=\"שאלון VIA\" aria-label=\"שאלון VIA\">\n      <div style=\"display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;\">\n        <span style=\"font:500 14px Ploni;color:#AD2185;\">שאלון VIA<\u002Fspan>\n        <span style=\"font:600 15px Ploni;color:#1E3C95;\">שאלה {{ qNum }} מתוך 24<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"height:8px;background:#E4E2DD;border-radius:5px;overflow:hidden;margin-bottom:22px;\">\n        <div style=\"{{ qBarStyle }}\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"qcard\" button>\n        <button onclick=\"{{ restart }}\" style=\"background:none;border:1.5px solid rgba(23,22,22,.15);color:#808285;border-radius:999px;padding:13px 30px;font:500 17px Ploni;cursor:pointer;\">התחלה מחדש<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- milestone toast -->\n  <sc-if value=\"{{ showMilestone }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:80;background:linear-gradient(145deg,#1E3C95,#040450);color:#fff;border-radius:999px;padding:12px 26px;font:600 18px Ploni;box-shadow:0 14px 36px rgba(20,24,60,.32);animation:floatBadge 1.5s ease forwards;display:flex;align-items:center;gap:10px;\">\n      <span style=\"color:#F1B4CE;\">✦<\u002Fspan>{{ milestoneText }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:fixed;bottom:0;left:0;right:0;height:6px;display:grid;grid-template-columns:repeat(6,1fr);z-index:70;\">\n    <span style=\"background:#6B76EC;\"><\u002Fspan><span style=\"background:#73D9F0;\"><\u002Fspan><span style=\"background:#A7C86F;\"><\u002Fspan><span style=\"background:#F9BE94;\"><\u002Fspan><span style=\"background:#F1717E;\"><\u002Fspan><span style=\"background:#D25089;\"><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:820},&quot;reducedMotionDefault&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  RATING = {\n    3: { label: `במידה רבה`, color: `#1F9AA6`, soft: `#E4F3F4`, ring: `rgba(31,154,166,.32)` },\n    2: { label: `במידה בינונית`, color: `#3C6FD1`, soft: `#EAF0FC`, ring: `rgba(60,111,209,.3)` },\n    1: { label: `במידה נמוכה`, color: `#8A9099`, soft: `#F1F1F0`, ring: `rgba(138,144,153,.28)` },\n  };\n  STEPS = [`פתיחה`,`אודות`,`לפני`,`אחרי`,`שאלון`,`עיבוד`,`מילון`,`רפלקציה`,`סיכום`];\n  SCREENS = [`intro`,`about`,`before`,`after`,`quiz`,`results`,`dictionary`,`reflection`,`summary`];\n  REFLECT = [\n    [`האם התוצאות מפתיעות אותך? באיזו מידה אתה מודע לחוזקות של הצוות שלך?`],\n    [`מה אתה עושה על-מנת שחברי הצוות יפגינו את החוזקות הללו בתפקידם ברמה היומיומית?`, `הגדר פעולות נוספות שתוכל לעשות על-מנת לאפשר לחברי הצוות לבטא את חוזקותיהן במידה מירבית`],\n    [`כיצד תוכל להמשיך לפתח את החוזקות הללו אצל חברי הצוות ולשכפל אותן למקרים ואינטראקציות נוספות?`],\n  ];\n  STRENGTHS = [\n    { name:`אהבה`, desc:`חברי הצוות מגלים חיבה זה לזה.`, dictTerm:`אהבה`, dictDef:`היכולת להעריך קרבה ויחסים בינאישיים לאחרים. היכולת להפגין חיבה.` },\n    { name:`אומץ`, desc:`לא נמנע מאתגרים או סיטואציות קשות. מבטא את מה שרואה לנכון, אפילו אם אחרים אינם מסכימים איתו.`, dictTerm:`אומץ`, dictDef:`היכולת להתגבר על פחד, להתמודד עם אמיתות לא נעימות, להגן על ערכים אפילו במחיר שאחרים לא מסכימים עם הנאמר.` },\n    { name:`אינטליגנציה חברתית`, desc:`מקדש גיוון ומעודד מגוון איכויות וכשרונות. מודע ורגיש למחשבות ותחושות חברי הצוות.`, dictTerm:`אינטליגנציה חברתית`, dictDef:`היכולת להיות מודע לרגשות ולצרכים של אנשים אחרים. היכולת לשמור על תחושת נוחות לכל חברי הצוות במצבים ובסיטואציות חברתיות שונות.` },\n    { name:`הוגנות`, desc:`לכל חברי הצוות הזדמנות הוגנת להביע דעה ולהציע הצעות.`, dictTerm:`הוגנות`, dictDef:`היכולת לשקול עקרונות מוסריים ולהסיק מה נכון לכל חברי הצוות מתוך סיטואציה מסוימת. יכולות הזדהות, אמפתיה וחמלה.` },\n    { name:`הומור`, desc:`לוקח את המציאות בפרופורציות, בחיוביות ובאופטימיות.`, dictTerm:`הומור`, dictDef:`היכולת לראות את היתרון בכל סיטואציה ולשמור על מצב רוח מרומם של חברי הצוות בסיטואציות מגוונות.` },\n    { name:`הכרת תודה`, desc:`שם לב ומעריך את הדברים הטובים שקורים. משקיע זמן בלהביע תודה.`, dictTerm:`הכרת תודה`, dictDef:`מודעות לדברים הטובים שקורים לחברי הצוות, ללא קבלה שלהם כמובנים מאליהם. אמירת תודה.` },\n    { name:`הנעת אחרים`, desc:`חברי הצוות דואגים להתגבש ולדרבן זה את זה להצלחה.`, dictTerm:`הנעת אנשים`, dictDef:`היכולת של חברי הצוות לעודד זה את זה להשלמת משימות ופרויקטים בהצלחה, תוך שמירה על יחסים טובים.` },\n    { name:`הערכה ליופי ומצוינות`, desc:`שם לב ומעריך יופי בסיטואציות רבות (טבע, אומנות, מוסיקה ועוד).`, dictTerm:`הערכה ליופי ומצוינות`, dictDef:`היכולת לראות ולהעריך יופי ומצוינות באובייקט פיסי, מיומנות וכישרון, ערכיות בכל תחומי החיים.` },\n    { name:`התמדה`, desc:`מסיים מה שהתחיל ומוצא דרכים להתגבר על מכשולים. מסופק מהשלמת משימות.`, dictTerm:`התמדה`, dictDef:`היכולת להתמיד במשימה עד סופה, להישאר ממוקדים נוכח מכשולים והפרעות. מאפשרת לחברי הצוות לשאת אתגרים ומאמץ לאורך זמן.` },\n    { name:`ויסות עצמי`, desc:`נמנע מעשיית יתר של דברים. שומר על \"קור רוח\".`, dictTerm:`ויסות עצמי`, dictDef:`היכולת להפגין מודעות לרגשות ולמעשים, להפגין משמעת ושליטה עצמית.` },\n    { name:`זהירות`, desc:`חושב מספר פעמים לפני קבלת החלטה. נמנע מלקחת סיכונים לא הכרחיים.`, dictTerm:`זהירות`, dictDef:`היכולת לתכנן לטווח קצר וארוך מטרות. צוות שלא מצטער על בחירותיו כי שקל אותן היטב.` },\n    { name:`יצירתיות`, desc:`חושב על דרכים חדשות ויצירתיות לביצוע. מסוגל לפתור בעיות בהרבה דרכים ייחודיות.`, dictTerm:`יצירתיות`, dictDef:`ייצור רעיונות או מעשים חדשים או יוצאי דופן ותורמים לצוות ולסביבתו באופן חיובי. שני פנים עיקריים ליצירתיות: סתגלנות ומקוריות.` },\n    { name:`כנות`, desc:`לוקח אחריות ומכיר בהצלחות לצד טעויות או כשלונות.`, dictTerm:`כנות`, dictDef:`היכולת להיות ישיר, להתנהל באופן אותנטי ונאמן למהות הצוות. היכולת לקחת אחריות על כשלונות לצד הצלחותיו של הצוות.` },\n    { name:`להט`, desc:`מתנהל ומבצע משימות עם אנרגיה והתרגשות.`, dictTerm:`להט`, dictDef:`היכולת לגשת למשימות בהתרגשות ולהיות מעורב בהן באופן מלא. מאפשר לצוות להגשים את עצמו ולחברי הצוות להיות שבעי רצון.` },\n    { name:`למדנות`, desc:`נהנה מלמידת מידע חדש.`, dictTerm:`למדנות`, dictDef:`היכולת לשאוף להשיג מידע וחוויות חדשות. היכולת ללמוד מקשיים וכישלונות ולהתמיד בדרך.` },\n    { name:`נדיבות`, desc:`חברי הצוות עוזרים זה לזה, משתפים במידע ומלמדים זה את זה.`, dictTerm:`נדיבות`, dictDef:`היכולת של חברי הצוות לעזור זה לזה ולהפיק הנאה הצוות מפגין סימפתיה, מוסריות ואחריות חברתית.` },\n    { name:`סקרנות`, desc:`מתעניין בהרבה דברים. מעוניין לחקור ולגלות דברים חדשים.`, dictTerm:`סקרנות`, dictDef:`הרצון לחקור רעיונות חדשים, פעילויות וחוויות. הרצון להגדיל ידע אישי.` },\n    { name:`עבודת צוות`, desc:`נרתם לשיתוף פעולה מירבי ומיטבי בין כל חברי הצוות.`, dictTerm:`עבודת צוות`, dictDef:`היכולת לעבוד בשיתוף פעולה. נאמן ומסור לרעיון ולערכים שעל פיהם הוא פועל.` },\n    { name:`צניעות`, desc:`מעשיו מדברים בעד עצמם. הצלחות נחגגות \"בתוך הבית\".`, dictTerm:`צניעות`, dictDef:`היכולת לבצע משימות בלי לצפות להיות בקדמת הבמה. מעדיף שיעריכו אותו על-פי מעשיו.` },\n    { name:`קבלה`, desc:`יודע לקבל טעויות בהבנה וכהזדמנות ללמידה.`, dictTerm:`קבלה`, dictDef:`היכולת להבין את הסיבות לטעויות או כשלונות ולראות בהם הזדמנות ללמידה.` },\n    { name:`ראייה רחבה`, desc:`מסוגל להעניק לאחרים עצות טובות. מסוגל לראות את \"התמונה הגדולה\".`, dictTerm:`ראייה רחבה`, dictDef:`היכולת לתאר סיטואציות ורעיונות בדרך הרלוונטית לאחרים. אחרים פונים אדם שחבריו אליו לעצה ותופשים את חבריו ככנבונים.` },\n    { name:`שיפוטיות`, desc:`מאמין ב-\"סוף מעשה במחשבה תחילה\". בוחן את כל האספקטים של הסיטואציה. פתוח לשינויים וניהול סיכונים מחושב.`, dictTerm:`שיפוטיות`, dictDef:`היכולת להסתמך על עובדות ולקבל החלטות מושכלות. מערב חשיבה היסקית ויכולת שקלול ובחינה של מרכיבים שונים ואף מנוגדים.` },\n    { name:`תחושה של כוונה`, desc:`חש משמעות וסיבה לפועלו. מרגיש חיבור למשהו גדול ממנו. גאוות יחידה.`, dictTerm:`תחושה של כוונה`, dictDef:`היכולת לחוש בעל משמעות ולהתחבר מטרה נעלה יותר. אמונותיו מסבות לו ביטחון והוא פועל בעקבותיהם בצורה שיכולה להעניק לחברי הצוות תחושת מימוש.` },\n    { name:`תקווה`, desc:`מצפה שאירועים טובים יתרחשו בעתיד ופועל לגרום לדברים טובים לקרות.`, dictTerm:`תקווה`, dictDef:`היכולת להאמין שיש לו שליטה על פעולותיו, לצפות לעתיד שיגיע ולפעול לשפרו. אופטימי ורואה את פעולותיו כתורמות לעתידו.` },\n  ];\n\n  _prevScreen = `intro`;\n  state = {\n    screen:`intro`, quizIndex:0,\n    ratings:new Array(24).fill(null),\n    primary:new Array(24).fill(false),\n    reflections:[``,``,``],\n    openDict:[], dictFilter:`all`,\n    reducedMotion:false, milestone:null, summaryReady:false,\n  };\n\n  componentDidMount(){\n    try{\n      const raw=localStorage.getItem(`viaTeamStrengths`);\n      if(raw){ const d=JSON.parse(raw);\n        this.setState({\n          ratings:Array.isArray(d.ratings)&&d.ratings.length===24?d.ratings:this.state.ratings,\n          primary:Array.isArray(d.primary)&&d.primary.length===24?d.primary:this.state.primary,\n          reflections:Array.isArray(d.reflections)&&d.reflections.length===3?d.reflections:this.state.reflections,\n        });\n      }\n    }catch(e){}\n    let rm=!!this.props.reducedMotionDefault;\n    try{ if(window.matchMedia && window.matchMedia(`(prefers-reduced-motion: reduce)`).matches) rm=true; }catch(e){}\n    if(rm) this.setState({reducedMotion:true});\n  }\n  persist(){\n    try{ localStorage.setItem(`viaTeamStrengths`, JSON.stringify({\n      ratings:this.state.ratings, primary:this.state.primary, reflections:this.state.reflections,\n    })); }catch(e){}\n  }\n  componentDidUpdate(){\n    if(this._prevScreen!==this.state.screen){\n      this._prevScreen=this.state.screen;\n      try{ window.scrollTo({top:0,behavior:this.state.reducedMotion?`auto`:`smooth`}); }catch(e){ try{window.scrollTo(0,0);}catch(e2){} }\n      if(this.state.screen===`summary`){ clearTimeout(this._sr); this._sr=setTimeout(()=>this.setState({summaryReady:true}), this.state.reducedMotion?60:1500); }\n      else if(this.state.summaryReady){ this.setState({summaryReady:false}); }\n    }\n  }\n  go(s){ this.setState({screen:s}); }\n  setRating(i,val){\n    this.setState(s=>{ const r=s.ratings.slice(), p=s.primary.slice(); r[i]=val; if(val!==3)p[i]=false; return {ratings:r,primary:p}; },\n      ()=>{ this.persist(); const ans=this.state.ratings.filter(x=>x!==null).length; if(ans===6||ans===12||ans===18) this.flash(ans); });\n  }\n  flash(n){ this.setState({milestone:n}); clearTimeout(this._mt); this._mt
